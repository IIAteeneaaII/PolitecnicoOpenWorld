name: QA Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  android-qa:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./PolitecnicoOpenWorld
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21 (JetBrains)
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Lint
        run: ./gradlew --no-daemon lintDebug

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

  node-qa:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server_path:
          - Multiplayer
          - MultiplayerZombie
    defaults:
      run:
        working-directory: ./${{ matrix.server_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./${{ matrix.server_path }}/package.json

      - name: Install dependencies
        run: npm install

      - name: Validate server syntax
        run: node --check server.js
